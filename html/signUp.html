<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>SIGN UP</title>
    <link rel="stylesheet" href="../css/signUp.css">
<link rel="icon" type="image/png" href="../img/headerLogo.png">

</head>

<body>

<a href="../home.html" class="back">
    ←חזרה 
</a>

<div class="container">

    <div class="left">

        <img src="../img/logo.png" class="bigLogo">

    </div>

    <div class="right">

        <div class="shape"></div>

        <div class="card">

            <h2 id="addingTaskTitle">הרשמה כמנהל</h2>

            <div id="sign-up-form">

            <form>

                <input type="text" placeholder="מספר זהות" required name="id">

                <input type="text" placeholder="שם מלא" required name="name">

                <input type="text" placeholder="שם משתמש" required name="userName">

                <input type="password" placeholder="סיסמה" required name="password">

                <input type="text" placeholder="שם הקמפוס" required name="campus">

                <button>הירשם כמנהל</button>
                <div id="is-success"></div>

            </form>

        </div>

            <div id="msg"> </div>

        </div>

    </div>

</div>
  <script src="../js/data.js"></script>
    <script src="../js/ls.js"></script>
    <script src="../js/signUp.js"></script>
</body>

</html>
