<!DOCTYPE html>
<html lang="en">

<head>

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="../css/login.css" />
<link rel="icon" type="image/png" href="../img/headerLogo.png">

</head>

<body>
                       
   <a href="../home.html" id="home-btn"><img src="../img/logo.png" alt=""/></a>  
    <div id="blue-container"></div>
    <div id="login-container">
        <div id="login-card">
            <img src="../img/logo.png" alt=""/>
            <h1>כניסה לחשבונך</h1>

            <form id="login-form">
                <div class="input-log">
                    <input id="userName" name="userName" required placeholder="שם משתמש">
                </div>

                <div class="input-log">
                    <input id="userPassword" name="userPassword" required placeholder="סיסמה">
                </div>
                <div id="errorMessage" class="error-msg"></div>

                <button class="log-btn">התחברות</button>
                <button id="sign-up" class="log-btn" type="button">משתמש חדש</button>



            </form>
        </div>
    </div>


    <script src="../js/data.js"></script>
    <script src="../js/ls.js"></script>


    <script src="../js/login.js"></script>
</body>

</html>
