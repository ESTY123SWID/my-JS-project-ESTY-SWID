<!DOCTYPE html>
<html lang="he" direction="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT MANAGEMENT</title>
    <link rel="stylesheet" href="../css/watch.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../img/headerLogo.png">

</head>
<body>

    <header>
        <div class="logo">
           <img src="../img/logo.png">
        </div>
        <div class="welcome">
            <h1>ניהול תלמידים במערכת</h1>
            <p>צפייה בהתקדמות, מעבר לפרופיל המלא וסנכרון משתמשים</p>
        </div>
        <div class="header-left">
            <button class="back-btn" >→ חזרה לפאנל</button>
        </div>
    </header>

    <div class="management-actions-wrapper">
        <div class="search-box">
            <input type="text" id="student-search-input" name="studentSearch" placeholder="חפש סטודנט לפי שם או ת.ז...">
        </div>
        <button class="add-student-fast-btn" >+ הוספת סטודנט חדש</button>
    </div>

    <section class="students-grid" id="students-container">

    </section>
 <script src="../js/data.js"></script>
    <script src="../js/ls.js"></script>
    <script src="../js/watch.js"></script>
</body>
</html>
